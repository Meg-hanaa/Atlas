services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      ATLAS_AUTH_DISABLED: "0"
      ATLAS_API_ROOT_PATH: "/api"
    volumes:
      - atlas_data:/app/data
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    expose:
      - "8501"
    env_file:
      - .env
    environment:
      ATLAS_API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      ATLAS_DOMAIN: ${ATLAS_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - streamlit
    restart: unless-stopped

volumes:
  atlas_data:
  caddy_data:
  caddy_config:
